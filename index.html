<!DOCTYPE html>
<html>
<head>
<title>Game Hub</title>

<style>
body{
font-family: Arial;
background:#111;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:20px;
}

.card{
background:#222;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.card img{
width:100%;
border-radius:8px;
}
</style>

</head>

<body>

<h1>My Games</h1>

<div class="grid" id="games"></div>

<script>

const games = [
{
name:"MCPE",
folder:"games/mcpe/",
image:"games/mcpe/thumb.png"
},
{
name:"Tetris",
folder:"games/tetris/",
image:"games/tetris/thumb.png"
}
];

const grid = document.getElementById("games");

games.forEach(g=>{
const div = document.createElement("div");
div.className = "card";

div.innerHTML = `
<img src="${g.image}">
<h3>${g.name}</h3>
`;

div.onclick = ()=>{
location.href = g.folder;
};

grid.appendChild(div);
});

</script>

</body>
</html>
